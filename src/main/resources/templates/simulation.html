<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>면접 시뮬레이션</title>
  <script src="/js/common.js" defer></script>
  <script src="/js/question-display.js" defer></script>
  <script src="/js/simulation.js" defer></script>
  <script src="/js/generate-feedback.js" defer></script>

  <style>
    /* 기존 CSS 스타일 유지 */
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-size: cover;
      padding-bottom: 60px;
    }
    header {
      background-color: #001f3f;
      color: white;
      padding: 15px 20px;
      text-align: center;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: background-color 0.3s ease;
    }
    header h1 {
      font-family: Charter;
      font-weight: bolder;
      margin: 0;
      font-size: 24px;
    }
    nav {
      display: flex;
      gap: 12.5px;
    }
    nav button {
      padding: 10px 15px;
      background: #001f3f;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 13px;
    }
    nav button:hover {
      background: lightgray;
    }
    main {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      width: 100%;
    }
    #camera-container {
      width: 800px;
      height: 500px;
      border: 3px solid #333;
      background-color: black;
      display: flex;
      justify-content: center;
      align-items: center;
      position: relative;
      margin-top: 10px;
      box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.3);
      flex-direction: column;
    }
    #camera-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: none;
      background-color: rgba(0, 0, 0, 0.5);
      color: white;
      font-size: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #controls {
      margin-top: 20px;
      display: flex;
      gap: 10px;
      justify-content: center;
    }
    button {
      padding: 10px 20px;
      font-size: 16px;
      background-color: #ffcc00;
      color: black;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background-color: #f2c200;
    }
    footer {
      left: 0;
      bottom: 0;
      width: 100%;
      background-color: ghostwhite;
      color: black;
      text-align: left;
      padding: 15px 15px;
    }
    .submit-button {
      display: flex;
      justify-content: flex-end;
      position: fixed;
      bottom: 20px;
      right: 20px;
    }
    .submit-button button {
      padding: 15px 30px;
      font-size: 20px;
      background-color: #ffcc00;
      color: black;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }
    .submit-button button:hover {
      background-color: #f2c200;
    }
    #timer {
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 18px;
      color: white;
      background-color: rgba(0, 0, 0, 0.5);
      padding: 5px;
      border-radius: 5px;
    }
    #question-section {
      background-color: #0f172a;
      color: white;
      font-weight: 900;
      padding: 10px;
      overflow-y: auto;
      margin-top: 10px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      line-height: 1.2;
      height: 70px;
      width: 70%;
      border-radius: 20px;
      font-size: 20px;
      font-family: "Andale Mono";
    }
    #auth-status button {
      display: inline-block;
      margin-left: 10px;
      padding: 5px 10px;
      background: #f7f9fc;
      border: 1px solid #ccc;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }
    #auth-status button:hover {
      background: lightgray;
    }
    #auth-status button[disabled] {
      background: #f0f0f0;
      cursor: default;
      color: #555;
      border-color: #ddd;
    }
  </style>
</head>
<body>
<header>
  <h1>InterQ</h1>
  <nav>
    <button onclick="goToPage('home')">Home</button>
    <button onclick="window.location.href='/upload'">이력서 Upload</button>
    <button onclick="goToPage('feedback')">이력서 FeedBack</button>
    <button onclick="goToPage('contact')">Contact</button>
    <button onclick="window.location.href='/login'">login</button>
    <span id="header-nickname" style="display: none;"></span>
  </nav>
</header>
<main>
  <h1>AI 면접 시뮬레이션</h1>
  <div id="question-section">
    <p>시뮬레이션 시작 버튼을 눌러 면접 질문을 시작하세요!</p>
  </div>
  <div id="camera-container">
    <div class="overlay" id="overlay"></div>
    <video id="camera" autoplay playsinline></video>
    <div id="timer">⏳00:00 ⏳</div>
  </div>
  <div id="controls">
    <button id="start-simulation">▶️ 시뮬레이션 시작</button>
    <button id="stop-simulation" style="display:none;">⏹️ 시뮬레이션 종료</button>
  </div>
  <div class="submit-button">
    <button type="submit" id="check-feedback">Check the FeedBack</button>
  </div>
</main>
<footer>
  <p>&copy; 2025 Smart AI Interview. All rights reserved.</p>
  <p>문의: https://www.sungkyul.ac.kr/computer/index.do/짬뽕밥</p>
  <p>소셜 미디어:
    <a href="https://www.sungkyul.ac.kr/computer/index.do" style="color: lightblue;">운영진</a> |
    <a href="#" style="color: lightblue;">Twitter</a> |
    <a href="#" style="color: lightblue;">Instagram</a>
  </p>
</footer>
</body>
</html>
