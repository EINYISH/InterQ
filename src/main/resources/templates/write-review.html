<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>후기 작성하기</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f9f9f9;
        }
        header {
            background-color: #001f3f;
            color: white;
            text-align: center;
            padding: 3px 0; /* 헤더 높이 줄이기 */
            font-size: 20px;
            transition: background-color 0.3s ease;
        }
        .container {
            width: 60%;
            margin: 40px auto;
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            padding: 30px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            margin-bottom: 5px;
            font-weight: bold;
        }
        .form-group input, .form-group textarea, .form-group select {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 14px;
            width: 100%;
            box-sizing: border-box;
        }
        .form-group input[type="file"] {
            border: none;
        }
        .form-group-checkbox {
            display: flex;
            align-items: center;
            gap: 10px;
            left : 10px;
        }
        .btn-container {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }
        .btn {
            padding: 10px 20px;
            background-color: #339DFF; /* 밝은 파랑 */
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
        }
        .btn:hover {
            background-color: #339DFF; /* 밝은 파랑 */
        }
        .preview-section {
            margin-top: 30px;
            border-top: 1px solid #ccc;
            padding-top: 20px;
        }
        .preview-section h2 {
            font-size: 18px;
            background-color: #339DFF; /* 밝은 파랑 */
        }
        footer {
            left: 0;
            bottom: 0;
            width: 100%;
            background-color: ghostwhite;
            color: black;
            text-align: center;
            padding: 15px 15px;
        }

        footer p {
            margin: 5px 0;
        }

        .review-visibility {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 10px;
        }

        .review-visibility label {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .submit-section {
            display: flex;
            justify-content: flex-end;
            margin-top: 20px;
        }

        #submit-btn {
            padding: 10px 20px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        #submit-btn:hover {
            background-color: #0056b3;
        }



    </style>
</head>
<body>
<header>
    <h1>후기 작성하기</h1>
</header>
<div class="container">
    <form id="review-form">
        <!-- 이름 입력 -->
        <div class="form-group">
            <label for="username">이름</label>
            <div class="form-group-checkbox">
                <input type="text" id="username" placeholder="이름을 입력하세요" />
                <label>
                    <input type="checkbox" id="anonymous"> 익명
                </label>
            </div>
        </div>
        <!-- 후기 내용 -->
        <div class="form-group">
            <label for="review">후기 내용</label>
            <textarea id="review" rows="6" placeholder="후기를 작성해주세요" required></textarea>
        </div>
        <!-- 별점 -->
        <div class="form-group">
            <label>별점</label>
            <select id="rating" required>
                <option value="" disabled selected>별점을 선택하세요</option>
                <option value="1">★ 1</option>
                <option value="2">★ 2</option>
                <option value="3">★ 3</option>
                <option value="4">★ 4</option>
                <option value="5">★ 5</option>
            </select>
        </div>
        <div class="review-visibility">
            <label>
                <input type="radio" name="visibility" value="public" checked>
                공개
            </label>
            <label>
                <input type="radio" name="visibility" value="private">
                비공개
            </label>
        </div>
        <div id="password-section" style="display: none; margin-top: 10px;">
            <label for="password">비밀번호 (4자리 숫자):</label>
            <input type="password" id="password" maxlength="4" placeholder="비밀번호 입력">
        </div>
        <div class="submit-section">
            <button id="submit-btn">후기 제출</button>
        </div>
    </form>


</div>
<footer>
    <p>&copy; 2025 Smart AI Interview. All rights reserved.</p>
    <p>문의: https://www.sungkyul.ac.kr/computer/index.do/짬뽕밥</p>
    <p>소셜 미디어:
        <a href="https://www.sungkyul.ac.kr/computer/index.do" style="color: lightblue;">운영진</a> |
        <a href="#" style="color: lightblue;">Twitter</a> |
        <a href="#" style="color: lightblue;">Instagram</a>
    </p>
</footer>
<script>
    document.addEventListener('DOMContentLoaded', function () {
        // 익명 작성 체크박스
        document.getElementById('anonymous').addEventListener('change', function () {
            const usernameInput = document.getElementById('username');
            if (this.checked) {
                usernameInput.value = '익명';
                usernameInput.disabled = true;
            } else {
                usernameInput.value = '';
                usernameInput.disabled = false;
            }
        });

        // 비공개 선택 시 비밀번호 필드 표시
        document.querySelectorAll('input[name="visibility"]').forEach((radio) => {
            radio.addEventListener('change', function () {
                const passwordSection = document.getElementById('password-section');
                if (this.value === 'private') {
                    passwordSection.style.display = 'block';
                } else {
                    passwordSection.style.display = 'none';
                }
            });
        });

        // 리뷰 작성 폼 제출
        document.getElementById('review-form').addEventListener('submit', async function (event) {
            event.preventDefault();

            const author = document.getElementById('username').value.trim() || '익명';
            const text = document.getElementById('review').value.trim();
            const rating = parseInt(document.getElementById('rating').value);
            const isPrivate = document.querySelector('input[name="visibility"]:checked').value === 'private';
            const password = isPrivate ? document.getElementById('password').value.trim() : null;

            // 입력값 유효성 검사
            if (!text) {
                alert("리뷰 내용을 입력해주세요.");
                return;
            }
            if (isNaN(rating) || rating < 1 || rating > 5) {
                alert("별점을 1~5 사이로 선택해주세요.");
                return;
            }
            if (isPrivate && (!password || password.length !== 4 || isNaN(password))) {
                alert("비공개 리뷰는 4자리 숫자 비밀번호가 필요합니다.");
                return;
            }

            const formData = {
                author, text, rating, is_private: isPrivate, password
            };

            try {
                const response = await fetch('/api/reviews', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData),
                });

                if (response.ok) {
                    alert('리뷰가 성공적으로 제출되었습니다!');
                    window.location.reload(); // 페이지 리로드
                } else {
                    alert('리뷰 제출 실패. 다시 시도해주세요.');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('서버 오류가 발생했습니다.');
            }
        });
    });


</script>
</body>
</html>
