
spring.datasource.url=jdbc:mysql://localhost:3306/resume_helper?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true


spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect


spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB
file.upload-dir=./uploads


server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false
server.servlet.session.timeout=30m
server.servlet.session.cookie.name=JSESSIONID
spring.session.store-type=none

logging.level.org.springframework=DEBUG
logging.level.com.example=DEBUG

#spring.sql.init.mode=always
#spring.sql.init.schema-locations=classpath:schema.sql

# ✅ 로컬 LLM (Ollama + Gemma) - OpenAI API 키 불필요
llm.base-url=http://localhost:11434/v1/chat/completions
llm.model=gemma3:4b

# ✅ 로컬 음성 전사 (whisper.cpp 서버) - language를 명시하지 않으면 한국어를 못 알아듣음
whisper.local-url=http://localhost:8081/inference
whisper.language=ko

# ✅ JWT 설정 - secret은 반드시 32자 이상 (HS256 요구사항), 실제 배포 시 환경변수로 분리 권장
jwt.secret=${JWT_SECRET:interq-local-dev-secret-key-change-in-production-32chars}
jwt.expiration-ms=86400000